<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ page.description | default: site.description | escape }}">
<meta name="author" content="{{ site.author.name }}">
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
<meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}Al-Vid Scriptorium, SCRA, geopolitical synthesis, Islamic intellectual history, civilizational studies, Sassanid legacy, Gondishapur, Syriac translation movement, Toledo school, Khorasan, Ahl al-Bayt, Imam Ali, Huntington thesis, civilizational clash, Sacred Civilization Research Archive, Saad Khizar Bosal{% endif %}">
<meta name="google-site-verification" content="F355fdOSXs_r5IkNNLpVqAs9YquWoswkuMRtT2l6zuc">

<!-- AI Crawler hints -->
<meta name="revisit-after" content="7 days">
<meta name="classification" content="Academic Research, Islamic Intellectual History, Civilizational Studies">
<meta name="category" content="Scholarly Archive">
<meta name="coverage" content="Worldwide">
<meta name="distribution" content="Global">
<link rel="sitemap" type="application/xml" title="Sitemap" href="https://alvidscriptorium.com/sitemap.xml">

<!-- Open Graph -->
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:locale" content="en_US">
<meta property="og:type" content="{% if page.url == '/' or page.url == '' %}website{% else %}article{% endif %}">
<meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description | escape }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="https://dargah-ghazikot.alvidscriptorium.com/assets/images/og-default.png">
<meta property="og:image:secure_url" content="https://dargah-ghazikot.alvidscriptorium.com/assets/images/og-default.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Al-Vid Scriptorium — Sacred Civilization Research Archive — NODE-02">

<!-- Twitter / X Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description | escape }}">
<meta name="twitter:image" content="https://dargah-ghazikot.alvidscriptorium.com/assets/images/og-default.png">
<meta name="twitter:image:alt" content="Al-Vid Scriptorium — SCRA NODE-02">

<!-- Canonical -->
<link rel="canonical" href="{{ page.url | absolute_url }}">

<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

<!-- Google Fonts — Inter · Cormorant Garamond · JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- ══ SCHEMA.ORG — SITE-WIDE @GRAPH ══ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ site.url }}/#website",
      "url": "{{ site.url }}/",
      "name": "{{ site.title }}",
      "description": "{{ site.description | escape }}",
      "inLanguage": "en-US",
      "publisher": { "@id": "{{ site.url }}/#author" }
    },
    {
      "@type": "Person",
      "@id": "{{ site.url }}/#author",
      "name": "{{ site.author.name }}",
      "jobTitle": "{{ site.author.title }}",
      "worksFor": {
        "@type": "Organization",
        "name": "Sacred Civilization Research Archive",
        "url": "https://dargah-ghazikot.alvidscriptorium.com"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Mandi Bahauddin",
        "addressRegion": "Punjab",
        "addressCountry": "PK"
      },
      "identifier": {
        "@type": "PropertyValue",
        "propertyID": "https://registry.identifiers.org/registry/orcid",
        "value": "0009-0004-9944-7378",
        "url": "https://orcid.org/0009-0004-9944-7378"
      },
      "sameAs": [
        "https://orcid.org/0009-0004-9944-7378",
        "https://alvidscriptorium.com/",
        "https://dargah-ghazikot.alvidscriptorium.com/"
      ]
    }
  ]
}
</script>

{% if page.title and page.url != '/' %}
<!-- ══ SCHEMA.ORG — BREADCRUMB ══ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Al-Vid Scriptorium",
      "item": "{{ site.url }}/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title }}",
      "item": "{{ page.url | absolute_url }}"
    }
  ]
}
</script>
{% endif %}

{% if page.title and page.url != '/' %}
<!-- ══ SCHEMA.ORG — PER-PAGE SCHOLARLY ARTICLE ══ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ScholarlyArticle",
  "@id": "{{ page.url | absolute_url }}#doc",
  "name": "{{ page.title }}",
  "headline": "{{ page.title }}",
  "description": "{{ page.description | default: site.description | escape }}",
  "url": "{{ page.url | absolute_url }}",
  "inLanguage": "en",
  "author": { "@id": "{{ site.url }}/#author" },
  "publisher": {
    "@type": "Organization",
    "name": "Sacred Civilization Research Archive",
    "url": "https://alvidscriptorium.com"
  },
  "isPartOf": { "@id": "{{ site.url }}/#website" },
  "genre": ["Islamic Intellectual History", "Geopolitical Analysis", "Civilizational Studies", "Source Criticism"],
  "isAccessibleForFree": true,
  "dateModified": "{{ page.last_modified_at | default: '2026-06-02' }}"
}
</script>
{% endif %}
