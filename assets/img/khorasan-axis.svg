<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 255" width="900" height="255" role="img" aria-label="Khorasan Axis — Ancient Sacred Corridor and Present Pakistan–Iran–Russia Resistance Axis">

  <!-- ══ TITLE ══ -->
  <text x="450" y="18" text-anchor="middle"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="8.5" letter-spacing="2.2" fill="rgba(200,144,64,0.45)">
    THE KHORASAN AXIS  ·  ANCIENT CORRIDOR  ·  PRESENT RE-ACTIVATION
  </text>

  <!-- ══ LAYER LABELS (far left) ══ -->
  <text x="18" y="93" text-anchor="start"
    font-family="'JetBrains Mono', monospace" font-size="7" letter-spacing="0.5"
    fill="rgba(200,144,64,0.38)" transform="rotate(-90,18,93)">
    ANCIENT
  </text>
  <text x="18" y="172" text-anchor="start"
    font-family="'JetBrains Mono', monospace" font-size="7" letter-spacing="0.5"
    fill="rgba(56,178,172,0.38)" transform="rotate(-90,18,172)">
    PRESENT
  </text>

  <!-- ══ ANCIENT SPINE — gold dashed, y=93 ══ -->
  <path d="M68,93 L810,93"
    stroke="#c89040" stroke-width="0.9" stroke-opacity="0.32"
    stroke-dasharray="5,4" fill="none"/>

  <!-- Direction arrow -->
  <polygon points="813,93 807,90 807,96"
    fill="#c89040" fill-opacity="0.3"/>

  <!-- Ancient nodes -->
  <!-- Medina / Hejaz — origin marker -->
  <circle cx="68" cy="93" r="4.5"
    stroke="#c89040" stroke-width="1.1" stroke-opacity="0.55"
    fill="rgba(200,144,64,0.08)"/>
  <text x="68" y="78" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(200,144,64,0.5)">Medina</text>
  <text x="68" y="87.5" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="6"
    fill="rgba(200,144,64,0.3)">origin</text>

  <!-- Najaf · Karbala -->
  <circle cx="158" cy="93" r="5"
    stroke="#c89040" stroke-width="1.2" stroke-opacity="0.65"
    fill="rgba(200,144,64,0.1)"/>
  <text x="158" y="77" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(200,144,64,0.58)">Najaf · Karbala</text>

  <!-- Qom -->
  <circle cx="255" cy="93" r="5"
    stroke="#c89040" stroke-width="1.2" stroke-opacity="0.65"
    fill="rgba(200,144,64,0.1)"/>
  <text x="255" y="77" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(200,144,64,0.58)">Qom</text>

  <!-- Isfahan · Rey — key Safavid node -->
  <circle cx="335" cy="93" r="5.5"
    stroke="#c89040" stroke-width="1.3" stroke-opacity="0.72"
    fill="rgba(200,144,64,0.13)"/>
  <text x="335" y="77" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(200,144,64,0.62)">Isfahan · Rey</text>
  <text x="335" y="69" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="6"
    fill="rgba(200,144,64,0.32)">Safavid capital</text>

  <!-- Mashhad — KEY NODE both layers -->
  <circle cx="435" cy="93" r="8"
    stroke="#c89040" stroke-width="1.6" stroke-opacity="0.88"
    fill="rgba(200,144,64,0.16)"/>
  <!-- Outer ring to mark it as key -->
  <circle cx="435" cy="93" r="12"
    stroke="#c89040" stroke-width="0.5" stroke-opacity="0.22"
    fill="none"/>
  <text x="435" y="63" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="8.5" font-weight="bold"
    fill="rgba(200,144,64,0.82)">Mashhad</text>
  <text x="435" y="73.5" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="6.5"
    fill="rgba(200,144,64,0.4)">Imam Reza Shrine</text>

  <!-- Nishapur · Balkh -->
  <circle cx="530" cy="93" r="5"
    stroke="#c89040" stroke-width="1.2" stroke-opacity="0.65"
    fill="rgba(200,144,64,0.1)"/>
  <text x="530" y="77" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(200,144,64,0.58)">Nishapur · Balkh</text>

  <!-- Kabul -->
  <circle cx="618" cy="93" r="5"
    stroke="#c89040" stroke-width="1.2" stroke-opacity="0.65"
    fill="rgba(200,144,64,0.1)"/>
  <text x="618" y="77" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(200,144,64,0.58)">Kabul</text>

  <!-- Lahore · Multan — KEY NODE both layers -->
  <circle cx="730" cy="93" r="8"
    stroke="#c89040" stroke-width="1.6" stroke-opacity="0.88"
    fill="rgba(200,144,64,0.16)"/>
  <circle cx="730" cy="93" r="12"
    stroke="#c89040" stroke-width="0.5" stroke-opacity="0.22"
    fill="none"/>
  <text x="730" y="63" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="8.5" font-weight="bold"
    fill="rgba(200,144,64,0.82)">Lahore · Multan</text>
  <text x="730" y="73.5" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="6.5"
    fill="rgba(200,144,64,0.4)">Khorasani formation zone</text>

  <!-- ══ VERTICAL CONNECTORS — same geography, two eras ══ -->
  <!-- Mashhad connector -->
  <line x1="435" y1="101" x2="435" y2="159"
    stroke="rgba(180,155,90,0.22)" stroke-width="0.8" stroke-dasharray="2,3"/>

  <!-- Lahore connector -->
  <line x1="730" y1="101" x2="730" y2="159"
    stroke="rgba(100,175,170,0.22)" stroke-width="0.8" stroke-dasharray="2,3"/>

  <!-- ══ PRESENT SPINE — teal solid, y=167 ══ -->
  <path d="M250,167 L810,167"
    stroke="#38b2ac" stroke-width="1.4" stroke-opacity="0.42" fill="none"/>

  <!-- Direction arrow -->
  <polygon points="813,167 807,164 807,170"
    fill="#38b2ac" fill-opacity="0.4"/>

  <!-- Russia — descends from top into Tehran -->
  <circle cx="335" cy="32" r="4.5"
    stroke="#38b2ac" stroke-width="1.1" stroke-opacity="0.6"
    fill="rgba(56,178,172,0.08)"/>
  <text x="335" y="24" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(56,178,172,0.52)">Russia</text>
  <!-- Russia → Tehran vertical connector -->
  <line x1="335" y1="37" x2="335" y2="160"
    stroke="#38b2ac" stroke-width="0.9" stroke-opacity="0.28"
    stroke-dasharray="3,4"/>
  <polygon points="335,162 332,155 338,155"
    fill="#38b2ac" fill-opacity="0.28"/>

  <!-- China / BRI — enters from right -->
  <circle cx="848" cy="130" r="4.5"
    stroke="#38b2ac" stroke-width="1.1" stroke-opacity="0.6"
    fill="rgba(56,178,172,0.08)"/>
  <text x="848" y="122" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(56,178,172,0.52)">China · BRI</text>
  <!-- China → CPEC connector -->
  <path d="M848,135 Q820,155 780,167"
    stroke="#38b2ac" stroke-width="0.9" stroke-opacity="0.28"
    stroke-dasharray="3,4" fill="none"/>

  <!-- Present nodes -->

  <!-- Tehran · Qom -->
  <circle cx="335" cy="167" r="6"
    stroke="#38b2ac" stroke-width="1.3" stroke-opacity="0.75"
    fill="rgba(56,178,172,0.12)"/>
  <text x="335" y="183" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(56,178,172,0.62)">Tehran · Qom</text>

  <!-- Mashhad present -->
  <circle cx="435" cy="167" r="7"
    stroke="#38b2ac" stroke-width="1.4" stroke-opacity="0.82"
    fill="rgba(56,178,172,0.14)"/>
  <text x="435" y="183" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(56,178,172,0.68)">Mashhad</text>

  <!-- Herat -->
  <circle cx="530" cy="167" r="5"
    stroke="#38b2ac" stroke-width="1.2" stroke-opacity="0.65"
    fill="rgba(56,178,172,0.1)"/>
  <text x="530" y="183" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(56,178,172,0.56)">Herat</text>

  <!-- Islamabad · CPEC -->
  <circle cx="635" cy="167" r="6"
    stroke="#38b2ac" stroke-width="1.3" stroke-opacity="0.75"
    fill="rgba(56,178,172,0.12)"/>
  <text x="635" y="183" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(56,178,172,0.62)">Islamabad · CPEC</text>

  <!-- Lahore present -->
  <circle cx="730" cy="167" r="7"
    stroke="#38b2ac" stroke-width="1.4" stroke-opacity="0.82"
    fill="rgba(56,178,172,0.14)"/>
  <text x="730" y="183" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(56,178,172,0.68)">Lahore</text>

  <!-- Gwadar branch — descends south from Lahore -->
  <path d="M730,174 Q748,203 762,218"
    stroke="#38b2ac" stroke-width="0.9" stroke-opacity="0.32"
    stroke-dasharray="3,3" fill="none"/>
  <circle cx="762" cy="218" r="4.5"
    stroke="#38b2ac" stroke-width="1.1" stroke-opacity="0.55"
    fill="rgba(56,178,172,0.08)"/>
  <text x="762" y="232" text-anchor="middle"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(56,178,172,0.48)">Gwadar</text>

  <!-- ══ LEGEND ══ -->
  <line x1="50" y1="244" x2="100" y2="244"
    stroke="#c89040" stroke-width="0.9" stroke-opacity="0.45" stroke-dasharray="5,4"/>
  <text x="108" y="247.5"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(200,144,64,0.45)">Ancient Sacred Corridor  ·  Imamic transmission route</text>

  <line x1="380" y1="244" x2="430" y2="244"
    stroke="#38b2ac" stroke-width="1.4" stroke-opacity="0.45"/>
  <text x="438" y="247.5"
    font-family="'JetBrains Mono', monospace" font-size="7.5"
    fill="rgba(56,178,172,0.45)">Present Resistance Axis  ·  BRI · CPEC · Pakistan–Iran–Russia</text>

</svg>
